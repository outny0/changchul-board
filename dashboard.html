<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>창출팀 월요약 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--pink:#F72585;--blue:#5BB8E8;--bg:#f0f4f8;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:#1a1a2e;font-size:13px;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:0 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);min-height:54px;flex-wrap:wrap;}
.hdr-title{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0;}
.hdr-date{font-size:11px;color:rgba(255,255,255,.45);white-space:nowrap;flex-shrink:0;}
.hdr-pills{display:flex;align-items:center;gap:5px;flex:1;flex-wrap:wrap;}
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:999px;font-size:10px;font-weight:600;white-space:nowrap;}
.p-gray{background:rgba(255,255,255,.1);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.15);}
.p-blue{background:rgba(91,184,232,.2);color:#93d7f6;border:1px solid rgba(91,184,232,.3);}
.p-pink{background:rgba(247,37,133,.2);color:#ff80ab;border:1px solid rgba(247,37,133,.35);}
.p-amber{background:rgba(255,160,0,.18);color:#ffcc80;border:1px solid rgba(255,160,0,.3);}
.p-green{background:rgba(76,175,80,.2);color:#81c784;border:1px solid rgba(76,175,80,.3);}
.p-violet{background:rgba(167,139,250,.2);color:#c4b5fd;border:1px solid rgba(167,139,250,.3);}

/* UPLOAD BAR */
.upload-bar{background:#fff;border-bottom:1px solid #e5e7eb;padding:7px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.up-item{display:flex;align-items:center;gap:6px;}
.up-label{font-size:11px;font-weight:700;color:#374151;white-space:nowrap;}
.up-status{font-size:10px;color:#9ca3af;white-space:nowrap;}
.up-status.ok{color:#16a34a;font-weight:600;}
.up-status.err{color:#dc2626;}
.file-btn{font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid #d1d5db;background:#f9fafb;cursor:pointer;color:#374151;white-space:nowrap;}
.file-btn:hover{background:#f3f4f6;}
.file-input{display:none;}
.vd{width:1px;height:18px;background:#e5e7eb;flex-shrink:0;}
.pay-btn{font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid rgba(91,184,232,.4);background:rgba(91,184,232,.08);cursor:pointer;color:#0369a1;white-space:nowrap;}
.pay-btn:hover{background:rgba(91,184,232,.15);}
@keyframes spin{to{transform:rotate(360deg);}}
.spn{display:inline-block;width:9px;height:9px;border:2px solid rgba(0,0,0,.15);border-top-color:#0369a1;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:3px;}
.up-hint{font-size:10px;color:#9ca3af;margin-left:auto;}

/* PAGE */
.page{padding:14px 18px;display:flex;flex-direction:column;gap:14px;}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#9ca3af;margin-bottom:8px;}

/* TEAM CARDS */
.team-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
@media(max-width:900px){.team-row{grid-template-columns:repeat(2,1fr);}}
.team-card{background:#fff;border-radius:12px;border-top:3px solid;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.tc-hdr{padding:10px 12px 8px;display:flex;align-items:center;justify-content:space-between;}
.tc-name{font-size:13px;font-weight:700;}
.tc-badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;}
.tc-kpi{display:flex;gap:0;border-top:1px solid #f3f4f6;}
.tc-kv{flex:1;padding:7px 8px;text-align:center;border-right:1px solid #f3f4f6;}
.tc-kv:last-child{border-right:none;}
.tc-kn{font-size:9px;color:#9ca3af;margin-bottom:2px;}
.tc-kd{font-size:15px;font-weight:700;}
.tc-ksub{font-size:10px;color:#9ca3af;}
.tc-teachers{border-top:1px solid #f3f4f6;}
.tc-thead{display:grid;grid-template-columns:1fr 80px 50px 50px 50px 52px;padding:4px 10px;font-size:9px;font-weight:700;color:#9ca3af;border-bottom:1px solid #f3f4f6;background:#fafafa;}
.tc-teacher{display:grid;grid-template-columns:1fr 80px 50px 50px 50px 52px;padding:5px 10px;font-size:11px;border-bottom:1px solid #f9f9f9;align-items:center;}
.tc-teacher:last-child{border-bottom:none;}
.tc-tname{color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tc-tid{color:#9ca3af;font-size:10px;}
.tc-tnum{text-align:right;}
.tc-tpay{text-align:right;font-weight:600;color:#1a1a2e;}
.tc-treal{text-align:right;font-weight:600;}
.tc-trate{text-align:right;font-size:10px;}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
@media(max-width:1000px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
.kpi-box{background:#fff;border-radius:10px;padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.kpi-lbl{font-size:10px;color:#9ca3af;margin-bottom:4px;}
.kpi-val{font-size:22px;font-weight:700;color:#1a1a2e;}
.kpi-sub{font-size:10px;color:#9ca3af;margin-top:2px;}
.kv-good{color:#16a34a;}
.kv-warn{color:#d97706;}
.kv-bad{color:#dc2626;}

/* WEEKLY SECTION */
.week-list{display:flex;flex-direction:column;gap:6px;}
.week-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.week-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.week-hdr:hover{background:#f9fafb;}
.week-hdr.open{background:#f8faff;}
.wk-label{font-size:12px;font-weight:700;color:#374151;min-width:42px;}
.wk-range{font-size:11px;color:#9ca3af;min-width:80px;}
.wk-today{font-size:10px;padding:2px 7px;border-radius:4px;background:#fef3c7;color:#b45309;border:1px solid #fde68a;}
.wk-total{display:flex;gap:14px;margin-left:auto;align-items:center;}
.wk-stat{display:flex;align-items:center;gap:4px;}
.wk-sn{font-size:10px;color:#9ca3af;}
.wk-sv{font-size:12px;font-weight:700;color:#1a1a2e;}
.wk-rate{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;}
.wk-btn{margin-left:8px;font-size:11px;color:#9ca3af;flex-shrink:0;transition:transform .2s;}
.wk-btn.open{transform:rotate(180deg);}

.week-body{display:none;border-top:1px solid #f3f4f6;padding:10px 14px 12px;}
.week-body.open{display:block;}

/* Team table inside week */
.wtbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
.wtbl th{text-align:left;padding:4px 8px;font-weight:600;color:#9ca3af;font-size:10px;border-bottom:1px solid #f3f4f6;}
.wtbl td{padding:5px 8px;border-bottom:1px solid #f9f9f9;}
.wtbl tr:last-child td{border-bottom:none;}
.team-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}

/* Daily toggle */
.daily-btn{font-size:10px;color:#6366f1;background:none;border:1px solid #e0e7ff;border-radius:5px;padding:3px 10px;cursor:pointer;margin-bottom:8px;}
.daily-btn:hover{background:#f0f0ff;}
.daily-wrap{display:none;}
.daily-wrap.open{display:block;}
.dtbl{width:100%;border-collapse:collapse;font-size:11px;}
.dtbl th{text-align:left;padding:3px 8px;font-weight:600;color:#9ca3af;font-size:10px;background:#f9fafb;border-bottom:1px solid #f3f4f6;}
.dtbl td{padding:4px 8px;border-bottom:1px solid #f9f9f9;}
.dtbl tr:last-child td{border-bottom:none;}
.dtbl tr.today-row td{background:#fffbeb;}
.d-today{font-size:9px;padding:1px 5px;border-radius:3px;background:#fef3c7;color:#92400e;margin-left:4px;}
.dtbl .d-rate{font-size:10px;}

/* TEACHER TABLE */
.tbl-wrap{overflow-x:auto;}
.tbl-section{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.tbl-hdr{padding:10px 14px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f3f4f6;}
.tbl-title{font-size:13px;font-weight:700;}
.tab-row{display:flex;gap:4px;}
.tab-btn{font-size:10px;padding:3px 10px;border-radius:6px;border:1px solid #e5e7eb;background:#f9fafb;cursor:pointer;color:#374151;}
.tab-btn:hover{background:#f3f4f6;}
.tab-btn.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e;}
table{width:100%;border-collapse:collapse;}
thead th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#9ca3af;border-bottom:1px solid #f3f4f6;white-space:nowrap;background:#fafafa;}
tbody td{padding:7px 10px;font-size:11px;border-bottom:1px solid #f9f9f9;white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#f9fafb;}
.td-name{font-weight:600;color:#1a1a2e;}
.t-badge{font-size:9px;padding:2px 6px;border-radius:5px;font-weight:600;}
.rh{color:#16a34a;font-weight:600;}
.rm{color:#d97706;font-weight:600;}
.rl{color:#dc2626;font-weight:600;}

.empty-note{text-align:center;padding:30px;color:#9ca3af;font-size:12px;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">창출팀 월요약 대시보드</div>
    <div class="hdr-date" id="hdrDate"></div>
  </div>
  <div class="hdr-pills" id="hdrPills">
    <span class="pill p-gray">파일을 선택해 주세요</span>
  </div>
</div>

<div class="upload-bar">
  <div class="up-item">
    <span class="up-label">📊 V1 가공</span>
    <label class="file-btn">파일 선택<input class="file-input" type="file" accept=".xlsx" onchange="onV1File(this)"></label>
    <span class="up-status" id="v1Status">미선택</span>
  </div>
  <div class="vd"></div>
  <div class="up-item">
    <span class="up-label">💳 결제</span>
    <button class="pay-btn" onclick="fetchPay()"><span class="spn" id="paySpin" style="display:none"></span>새로고침</button>
    <span class="up-status" id="payStatus">미로드</span>
  </div>
  <span class="up-hint">V1 파일은 한 번 선택하면 브라우저에 저장됩니다 &nbsp;|&nbsp; <button onclick="clearCache()" style="font-size:10px;color:#dc2626;background:none;border:none;cursor:pointer;text-decoration:underline;">캐시 초기화</button></span>
</div>

<div class="page">
  <!-- 팀별 현황 -->
  <div>
    <div class="sec-lbl">팀별 현황</div>
    <div class="team-row" id="teamRow"></div>
  </div>

  <!-- 월간 종합 KPI -->
  <div>
    <div class="sec-lbl">월간 종합</div>
    <div class="kpi-grid" id="kpiGrid"></div>
  </div>

  <!-- 주별 마감 현황 -->
  <div>
    <div class="sec-lbl">주별 마감 현황</div>
    <div class="week-list" id="weekList"></div>
  </div>

  <!-- 교사별 세부 현황 -->
  <div class="tbl-section">
    <div class="tbl-hdr">
      <span class="tbl-title">교사별 세부 현황</span>
      <div class="tab-row" id="tabRow"></div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>교사명</th><th>팀</th><th>월 실제종료</th><th>결제수</th><th>청철</th><th>실제결제</th><th>전환율</th>
        </tr></thead>
        <tbody id="tblBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ─── 상수 ───────────────────────────────────────────────
var PAYMENT_FILE_ID = '1BlgT3aH7MXpqoQGwUtcTO5reod0KmgbQ9S9iwuuIGqA';
var PAYMENT_GID     = '1949444270';
var TEAM_NAMES = ['땅이팀','다래팀','해태팀','단비팀'];
var TEAM_CFG = {
  '땅이팀':{hdr:'#eff6ff',txt:'#2563eb',bar:'#3b82f6',dot:'#3b82f6',bbg:'#dbeafe',btxt:'#1d4ed8',bdr:'3px solid #3b82f6'},
  '다래팀':{hdr:'#f0fdf4',txt:'#16a34a',bar:'#22c55e',dot:'#22c55e',bbg:'#dcfce7',btxt:'#15803d',bdr:'3px solid #22c55e'},
  '해태팀':{hdr:'#fffbeb',txt:'#d97706',bar:'#f59e0b',dot:'#f59e0b',bbg:'#fef3c7',btxt:'#b45309',bdr:'3px solid #f59e0b'},
  '단비팀':{hdr:'#f5f3ff',txt:'#7c3aed',bar:'#8b5cf6',dot:'#8b5cf6',bbg:'#ede9fe',btxt:'#6d28d9',bdr:'3px solid #8b5cf6'},
};

var state = {v1:null, pay:null};
var currentFilter = '전체';

function p2(n){return String(n).padStart(2,'0');}

// ─── 날짜 ───────────────────────────────────────────────
function getDate() {
  var d = new Date();
  return {
    ymd  : d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()),
    ym   : d.getFullYear()+'-'+p2(d.getMonth()+1),
    year : d.getFullYear(),
    month: d.getMonth()+1,
    day  : d.getDate(),
    label: d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+'일월화수목금토'[d.getDay()]+')',
  };
}

// ─── 주 계산 ─────────────────────────────────────────────
// 해당 월의 주 목록 반환 (일요일 기준 마감, 월 경계 내)
function getWeeks(year, month) {
  var lastDay = new Date(year, month, 0).getDate();
  var weeks = [];
  var d = 1;
  while (d <= lastDay) {
    var dow = new Date(year, month-1, d).getDay(); // 0=일 1=월
    var daysToSun = (dow === 0) ? 0 : 7 - dow;
    var end = Math.min(d + daysToSun, lastDay);
    weeks.push({
      start: d, end: end,
      label: (weeks.length + 1) + '주차',
      startStr: year+'-'+p2(month)+'-'+p2(d),
      endStr:   year+'-'+p2(month)+'-'+p2(end),
    });
    d = end + 1;
  }
  return weeks;
}


// ─── V1 파싱 ─────────────────────────────────────────────
// 피벗_교사별_날짜별: 교사ID | 교사명 | YYYY-MM-DD... | 합계
function parseV1Workbook(wb) {
  // 시트 찾기: '피벗_교사별_날짜별' 우선, 없으면 '피벗' 포함 시트
  var ws = null, foundSheet = '';
  if (wb.Sheets['피벗_교사별_날짜별']) { ws = wb.Sheets['피벗_교사별_날짜별']; foundSheet='피벗_교사별_날짜별'; }
  else { for (var sn of wb.SheetNames) { if (sn.indexOf('피벗') >= 0) { ws = wb.Sheets[sn]; foundSheet=sn; break; } } }
  if (!ws) {
    console.warn('[V1] 피벗 시트 없음. 존재하는 시트:', wb.SheetNames);
    return null;
  }
  console.log('[V1] 사용 시트:', foundSheet, '/ 전체 시트:', wb.SheetNames);

  var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if (rows.length < 2) return null;
  var header = rows[0];
  console.log('[V1] 헤더 앞 5개:', header.slice(0,5), '... 마지막 5개:', header.slice(-5));

  // 날짜 컬럼 찾기
  var dateIdxs = {}; // 'YYYY-MM-DD' → col index
  // 합계 컬럼 찾기 (이름으로 검색, 없으면 마지막 컬럼)
  var totalIdx = -1;
  for (var c = 2; c < header.length; c++) {
    var h = String(header[c]||'').trim();
    if (h === '합계') { totalIdx = c; continue; }
    if (/^\d{4}-\d{2}-\d{2}$/.test(h)) { dateIdxs[h] = c; continue; }
    if (typeof header[c] === 'number' && header[c] > 40000) {
      var dd = new Date(Math.round((header[c]-25569)*86400000));
      var ds = dd.getFullYear()+'-'+p2(dd.getMonth()+1)+'-'+p2(dd.getDate());
      dateIdxs[ds] = c;
    }
  }
  if (totalIdx < 0) totalIdx = header.length - 1;

  var dates = Object.keys(dateIdxs).sort();
  console.log('[V1] 감지된 날짜 수:', dates.length, '/ 범위:', dates[0], '~', dates[dates.length-1]);
  console.log('[V1] 합계 컬럼 index:', totalIdx, '값:', header[totalIdx]);

  var result = {};
  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    var tid  = String(r[0]||'').trim();
    var name = String(r[1]||'').trim();
    if (!tid || tid==='합계' || tid==='교사ID') continue;
    var daily = {};
    for (var ds in dateIdxs) { var v=parseInt(r[dateIdxs[ds]])||0; if(v>0) daily[ds]=v; }
    var total = parseInt(r[totalIdx])||0;
    // 합계가 0이면 daily 합산으로 대체
    if (total===0 && Object.keys(daily).length>0) {
      total = Object.values(daily).reduce(function(s,v){return s+v;},0);
    }
    result[tid] = {name:name, daily:daily, monthTotal:total, dateRange: dates.length>0 ? dates[0].slice(0,7) : ''};
  }
  console.log('[V1] 파싱 완료:', Object.keys(result).length, '명');
  return result;
}

// ─── 결제 CSV 파싱 ──────────────────────────────────────
// 구조: 교사번호 | 1..31(일별결제) | 1주마감..5주마감 | [합계] | [청철]
// 합계/청철 컬럼 없으면 일별 합산으로 대체
function parsePayCSV(text) {
  var rows = [];
  text.split('\n').forEach(function(line) {
    var cols=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){var ch=line[i];
      if(inQ){if(ch==='"')inQ=false;else cur+=ch;}
      else{if(ch==='"')inQ=true;else if(ch===','){cols.push(cur.trim());cur='';}else cur+=ch;}}
    cols.push(cur.trim()); rows.push(cols);
  });
  if(rows.length<2){console.warn('[Pay] 행이 2개 미만');return null;}

  var hdr=rows[0];
  var dayIdxs={}, iTotal=-1, iWd=-1;
  hdr.forEach(function(v,i){
    var s=String(v||'').trim(), n=parseInt(s);
    // 일별 컬럼: 헤더가 1~31인 정수
    if(!isNaN(n)&&n>=1&&n<=31&&String(n)===s) { dayIdxs[n]=i; return; }
    if(s==='합계') { iTotal=i; return; }
    if(s==='청철'||s==='취소'||s==='환불') { iWd=i; return; }
  });

  var dayCount=Object.keys(dayIdxs).length;
  console.log('[Pay] 헤더:', hdr.slice(0,5),'...총',hdr.length,'열 / 일별컬럼:',dayCount,'개 / 합계idx:',iTotal,'/ 청철idx:',iWd);

  var dailyTotals=new Array(31).fill(0);
  var map={}, teacherCount=0;

  for(var r=1;r<rows.length;r++){
    var row=rows[r], id=String(row[0]||'').trim();
    if(!id||!/^\d{5,}$/.test(id))continue;
    teacherCount++;
    var daily={}, daySum=0;
    for(var d=1;d<=31;d++){
      if(dayIdxs[d]!==undefined){
        var v=parseInt(row[dayIdxs[d]])||0;
        if(v>0){daily[d]=v; daySum+=v;}
        dailyTotals[d-1]+=v;
      }
    }
    var monthTotal = daySum;  // 일별 컬럼(1~30) 합산 고정 — 합계 컬럼 무시
    var withdrawal = iWd>=0   ? (parseInt(row[iWd])  ||0) : 0;
    map[id]={monthTotal:monthTotal, withdrawal:withdrawal, daily:daily};
  }
  console.log('[Pay] 파싱 완료:', teacherCount,'명 / 월결제=일별합산 / 청철방식:', iWd>=0?'청철컬럼':'없음(0)');
  return {map:map, dailyTotals:dailyTotals};
}

// ─── 데이터 합치기 ───────────────────────────────────────
function combineData() {
  var dt=getDate(), ym=dt.ym;

  // settings에서 팀 매핑 + 팀 목표 로드
  var cfg={};
  try{cfg=JSON.parse(localStorage.getItem('changchul_settings')||'{}');}catch(e){}
  var targets=cfg.targets&&cfg.targets[ym]?cfg.targets[ym]:{};

  // 교사 ID → 팀 매핑
  var teacherTeamMap={};
  if(cfg.teachers){cfg.teachers.forEach(function(t){if(t.id)teacherTeamMap[t.id]=t.team;});}

  var teacherMap={};

  // V1: 실종료 데이터 (이번 달만)
  if(state.v1){Object.keys(state.v1).forEach(function(tid){
    var v=state.v1[tid];
    var team=teacherTeamMap[tid]||'';
    var mEnd=0;
    Object.keys(v.daily).forEach(function(ds){if(ds.slice(0,7)===ym)mEnd+=(v.daily[ds]||0);});
    teacherMap[tid]={name:v.name,team:team,daily_end:v.daily,daily_pay:{},monthEnd:mEnd,monthPayment:0,withdrawal:0};
  });}

  // 결제: 결제수 + 청철
  if(state.pay){Object.keys(state.pay.map).forEach(function(tid){
    var p=state.pay.map[tid];
    if(!teacherMap[tid])teacherMap[tid]={name:'',team:teacherTeamMap[tid]||'',daily_end:{},daily_pay:{},monthEnd:0,monthPayment:0,withdrawal:0};
    teacherMap[tid].daily_pay=p.daily;
    teacherMap[tid].monthPayment=p.monthTotal;
    teacherMap[tid].withdrawal=p.withdrawal;
  });}

  // 팀 집계
  var teams={};
  TEAM_NAMES.forEach(function(nm){teams[nm]={name:nm,target:targets[nm]||0,monthPayment:0,monthEnd:0,withdrawal:0,headcount:0};});

  var teachers=[];
  Object.keys(teacherMap).forEach(function(tid){
    var t=teacherMap[tid]; if(!t.name)return;
    t.teacherID=tid;
    t.realPay=Math.max(0,t.monthPayment-t.withdrawal);
    t.monthRate=t.monthEnd>0?(t.monthPayment/t.monthEnd*100).toFixed(1)+'%':'0%';
    teachers.push(t);
    var tm=t.team&&teams[t.team];
    if(tm){tm.headcount++;tm.monthPayment+=t.monthPayment;tm.monthEnd+=t.monthEnd;tm.withdrawal+=t.withdrawal;}
  });

  TEAM_NAMES.forEach(function(nm){
    var m=teams[nm];
    m.realPay=Math.max(0,m.monthPayment-m.withdrawal);
    m.monthRate=m.monthEnd>0?Math.round(m.monthPayment/m.monthEnd*100)+'%':'0%';
  });

  return {teams:teams,teachers:teachers,teacherMap:teacherMap,
    dailyTotals:state.pay?state.pay.dailyTotals:new Array(31).fill(0),
    year:dt.year,month:dt.month,today:dt.day,ymd:dt.ymd,ym:ym};
}

// ─── 주별 데이터 계산 ────────────────────────────────────
function calcWeekData(week, data) {
  var teams={};
  TEAM_NAMES.forEach(function(t){teams[t]={end:0,pay:0};});
  var daily={};
  var ym=data.ym;
  for(var d=week.start;d<=week.end;d++){
    daily[d]={end:0,pay:0};
    var ds=ym+'-'+p2(d);
    // V1 end per team
    data.teachers.forEach(function(t){
      var endV=(t.daily_end&&t.daily_end[ds])||0;
      var payV=(t.daily_pay&&t.daily_pay[d])||0;
      if(t.team&&teams[t.team]){teams[t.team].end+=endV;teams[t.team].pay+=payV;}
      daily[d].end+=endV; daily[d].pay+=payV;
    });
  }
  var totEnd=TEAM_NAMES.reduce(function(s,t){return s+teams[t].end;},0);
  var totPay=TEAM_NAMES.reduce(function(s,t){return s+teams[t].pay;},0);
  return {teams:teams,total:{end:totEnd,pay:totPay},daily:daily};
}

// ─── 렌더 함수들 ────────────────────────────────────────
function tryRender() {
  if(!state.v1&&!state.pay){
    document.getElementById('hdrPills').innerHTML='<span class="pill p-gray">V1 가공파일을 선택해 주세요</span>';
    return;
  }
  var data=combineData();
  renderHeader(data);
  renderTeams(data);
  renderKPI(data);
  renderWeeks(data);
  buildTabs();
  renderTable(data, currentFilter);
}

function renderHeader(data) {
  var tot={target:0,pay:0,end:0,wd:0};
  TEAM_NAMES.forEach(function(nm){var m=data.teams[nm];tot.target+=m.target;tot.pay+=m.monthPayment;tot.end+=m.monthEnd;tot.wd+=m.withdrawal;});
  var rate=tot.target>0?Math.round(tot.pay/tot.target*100):0;
  var rCls=rate>=100?'p-green':rate>=80?'p-amber':'p-pink';
  document.getElementById('hdrPills').innerHTML=
    '<span class="pill '+rCls+'">달성률 '+rate+'%</span>'+
    '<span class="pill p-gray">월목표 '+tot.target+'</span>'+
    '<span class="pill p-blue">월결제 '+tot.pay+'</span>'+
    '<span class="pill p-violet">실제결제 '+(Math.max(0,tot.pay-tot.wd))+'</span>'+
    '<span class="pill p-gray">실제종료 '+tot.end+'</span>'+
    '<span class="pill p-pink">청철 '+tot.wd+'</span>';
}

function renderTeams(data) {
  document.getElementById('teamRow').innerHTML=TEAM_NAMES.map(function(nm){
    var m=data.teams[nm], cfg=TEAM_CFG[nm];
    var teachers=data.teachers.filter(function(t){return t.team===nm;})
      .sort(function(a,b){return b.monthPayment-a.monthPayment;});
    var rate=m.target>0?Math.round(m.monthPayment/m.target*100):0;
    var rCls=rate>=100?'kv-good':rate>=80?'kv-warn':'kv-bad';

    var tRows=teachers.map(function(t){
      var rate2=parseFloat(t.monthRate)||0;
      var rCls2=rate2>=70?'kv-good':rate2>=50?'kv-warn':'kv-bad';
      var realCls=t.realPay>0?'':'';
      return '<div class="tc-teacher">'+
        '<span class="tc-tname">'+t.name+'</span>'+
        '<span class="tc-tid">'+t.teacherID+'</span>'+
        '<span class="tc-tnum">'+t.monthEnd+'</span>'+
        '<span class="tc-tpay">'+t.monthPayment+'</span>'+
        '<span class="tc-tnum" style="color:#dc2626">'+t.withdrawal+'</span>'+
        '<span class="tc-treal">'+t.realPay+'</span>'+
        '<span class="tc-trate '+rCls2+'">'+t.monthRate+'</span>'+
      '</div>';
    }).join('');

    return '<div class="team-card" style="border-top:3px solid '+cfg.bar+'">'+
      '<div class="tc-hdr" style="background:'+cfg.hdr+'">'+
        '<span class="tc-name" style="color:'+cfg.txt+'">'+nm+'</span>'+
        '<span class="tc-badge" style="background:'+cfg.bbg+';color:'+cfg.btxt+'">'+m.headcount+'명</span>'+
      '</div>'+
      '<div class="tc-kpi">'+
        '<div class="tc-kv"><div class="tc-kn">월목표</div><div class="tc-kd">'+m.target+'</div></div>'+
        '<div class="tc-kv"><div class="tc-kn">결제</div><div class="tc-kd '+rCls+'">'+m.monthPayment+'</div><div class="tc-ksub">'+rate+'%</div></div>'+
        '<div class="tc-kv"><div class="tc-kn">실제결제</div><div class="tc-kd">'+m.realPay+'</div></div>'+
        '<div class="tc-kv"><div class="tc-kn">실제종료</div><div class="tc-kd">'+m.monthEnd+'</div></div>'+
      '</div>'+
      '<div class="tc-teachers">'+
        '<div class="tc-thead"><span>이름</span><span>교사번호</span><span style="text-align:right">종료</span><span style="text-align:right">결제</span><span style="text-align:right">청철</span><span style="text-align:right">실결제</span></div>'+
        tRows+
      '</div>'+
    '</div>';
  }).join('');
}

function renderKPI(data) {
  var tot={target:0,pay:0,end:0,wd:0};
  TEAM_NAMES.forEach(function(nm){var m=data.teams[nm];tot.target+=m.target;tot.pay+=m.monthPayment;tot.end+=m.monthEnd;tot.wd+=m.withdrawal;});
  var realPay=Math.max(0,tot.pay-tot.wd);
  var rate=tot.target>0?Math.round(tot.pay/tot.target*100):0;
  var convRate=tot.end>0?(tot.pay/tot.end*100).toFixed(1):'0';
  var rCls=rate>=100?'kv-good':rate>=80?'kv-warn':'kv-bad';
  var cCls=parseFloat(convRate)>=70?'kv-good':parseFloat(convRate)>=50?'kv-warn':'kv-bad';
  document.getElementById('kpiGrid').innerHTML=
    kpiBox('월 목표',tot.target,'건')+
    kpiBox('월 결제','<span class="'+rCls+'">'+tot.pay+'</span>','달성률 '+rate+'%')+
    kpiBox('실제 결제',realPay,'결제-청철')+
    kpiBox('청철',tot.wd,'건')+
    kpiBox('월 실제종료',tot.end,'건')+
    kpiBox('전환율','<span class="'+cCls+'">'+convRate+'%</span>','결제÷종료');
}
function kpiBox(lbl,val,sub){return '<div class="kpi-box"><div class="kpi-lbl">'+lbl+'</div><div class="kpi-val">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>';}

// ─── 주별 마감 렌더 ──────────────────────────────────────
var _weekData=[];
function renderWeeks(data) {
  var weeks=getWeeks(data.year,data.month);
  _weekData=[];
  var todayWi=-1;
  weeks.forEach(function(wk,wi){if(data.today>=wk.start&&data.today<=wk.end)todayWi=wi;});

  document.getElementById('weekList').innerHTML=weeks.map(function(wk,wi){
    var wd=calcWeekData(wk,data);
    _weekData.push({week:wk,wd:wd});
    var isOpen=(wi===todayWi);
    var totRate=wd.total.end>0?(wd.total.pay/wd.total.end*100).toFixed(1)+'%':'-%';
    var rCls=wd.total.end>0?(parseFloat(totRate)>=70?'kv-good':parseFloat(totRate)>=50?'kv-warn':'kv-bad'):'';
    var todayBadge=(wi===todayWi)?'<span class="wk-today">진행중</span>':'';
    var rangeLabel=(data.month)+'/'+(wk.start)+' ~ '+(data.month)+'/'+(wk.end);

    // Team table rows
    var tRows=TEAM_NAMES.map(function(nm){
      var td=wd.teams[nm],cfg=TEAM_CFG[nm];
      var tr=td.end>0?(td.pay/td.end*100).toFixed(1)+'%':'-%';
      var trCls=td.end>0?(parseFloat(tr)>=70?'kv-good':parseFloat(tr)>=50?'kv-warn':'kv-bad'):'';
      return '<tr><td><span class="team-dot" style="background:'+cfg.dot+'"></span>'+nm+'</td>'+
        '<td style="text-align:right">'+td.end+'</td>'+
        '<td style="text-align:right">'+td.pay+'</td>'+
        '<td style="text-align:right" class="'+trCls+'">'+tr+'</td></tr>';
    }).join('');

    // Daily rows
    var dRows='';
    for(var d=wk.start;d<=wk.end;d++){
      var dd=wd.daily[d]||{end:0,pay:0};
      var dr=dd.end>0?(dd.pay/dd.end*100).toFixed(1)+'%':'-%';
      var drCls=dd.end>0?(parseFloat(dr)>=70?'kv-good':parseFloat(dr)>=50?'kv-warn':'kv-bad'):'';
      var isTodayDay=(d===data.today);
      var dowLabel='일월화수목금토'[new Date(data.year,data.month-1,d).getDay()];
      dRows+='<tr'+(isTodayDay?' class="today-row"':'')+'><td>'+(data.month)+'/'+d+'('+dowLabel+')'+(isTodayDay?'<span class="d-today">오늘</span>':'')+'</td>'+
        '<td style="text-align:right">'+dd.end+'</td>'+
        '<td style="text-align:right">'+dd.pay+'</td>'+
        '<td style="text-align:right" class="d-rate '+drCls+'">'+dr+'</td></tr>';
    }

    return '<div class="week-card">'+
      '<div class="week-hdr'+(isOpen?' open':'')+'" onclick="toggleWeek('+wi+')" id="wkhdr-'+wi+'">'+
        '<span class="wk-label">'+wk.label+'</span>'+
        '<span class="wk-range">'+rangeLabel+'</span>'+
        todayBadge+
        '<div class="wk-total">'+
          '<div class="wk-stat"><span class="wk-sn">종료</span><span class="wk-sv">'+wd.total.end+'</span></div>'+
          '<div class="wk-stat"><span class="wk-sn">결제</span><span class="wk-sv">'+wd.total.pay+'</span></div>'+
          '<span class="wk-rate '+rCls+'">'+totRate+'</span>'+
        '</div>'+
        '<span class="wk-btn'+(isOpen?' open':'')+'" id="wkbtn-'+wi+'">▼</span>'+
      '</div>'+
      '<div class="week-body'+(isOpen?' open':'')+'" id="wkbody-'+wi+'">'+
        '<table class="wtbl">'+
          '<thead><tr><th>팀</th><th style="text-align:right">종료</th><th style="text-align:right">결제</th><th style="text-align:right">전환율</th></tr></thead>'+
          '<tbody>'+tRows+'</tbody>'+
        '</table>'+
        '<button class="daily-btn" onclick="toggleDaily('+wi+',event)">일별 보기 ▾</button>'+
        '<div class="daily-wrap" id="dailywrap-'+wi+'">'+
          '<table class="dtbl">'+
            '<thead><tr><th>날짜</th><th style="text-align:right">종료</th><th style="text-align:right">결제</th><th style="text-align:right">전환율</th></tr></thead>'+
            '<tbody>'+dRows+'</tbody>'+
          '</table>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');

  if(weeks.length===0)document.getElementById('weekList').innerHTML='<div class="empty-note">데이터가 없습니다</div>';
}

function toggleWeek(wi) {
  var body=document.getElementById('wkbody-'+wi);
  var hdr=document.getElementById('wkhdr-'+wi);
  var btn=document.getElementById('wkbtn-'+wi);
  var open=body.classList.toggle('open');
  hdr.classList.toggle('open',open);
  btn.classList.toggle('open',open);
}
function toggleDaily(wi,e) {
  e.stopPropagation();
  var wrap=document.getElementById('dailywrap-'+wi);
  var btn=e.target;
  var open=wrap.classList.toggle('open');
  btn.textContent=open?'일별 닫기 ▴':'일별 보기 ▾';
}

// ─── 교사 테이블 ─────────────────────────────────────────
function buildTabs() {
  document.getElementById('tabRow').innerHTML=['전체'].concat(TEAM_NAMES).map(function(f){
    return '<button class="tab-btn'+(f===currentFilter?' on':'')+'" onclick="setFilter(\''+f+'\')">'+f+'</button>';
  }).join('');
}
function setFilter(f){currentFilter=f;var d=combineData();buildTabs();renderTable(d,f);}

function renderTable(data, filter) {
  var teachers=filter==='전체'?data.teachers.slice():data.teachers.filter(function(t){return t.team===filter;});
  teachers.sort(function(a,b){return b.monthPayment-a.monthPayment;});
  document.getElementById('tblBody').innerHTML=teachers.map(function(t){
    var cfg=TEAM_CFG[t.team]||TEAM_CFG['단비팀'];
    var rate=parseFloat(t.monthRate)||0;
    var rCls=rate>=70?'rh':rate>=50?'rm':'rl';
    return '<tr>'+
      '<td class="td-name">'+t.name+'</td>'+
      '<td><span class="t-badge" style="background:'+cfg.bbg+';color:'+cfg.btxt+'">'+t.team+'</span></td>'+
      '<td>'+t.monthEnd+'</td>'+
      '<td>'+t.monthPayment+'</td>'+
      '<td style="color:#dc2626">'+t.withdrawal+'</td>'+
      '<td><b>'+t.realPay+'</b></td>'+
      '<td class="'+rCls+'">'+t.monthRate+'</td>'+
    '</tr>';
  }).join('')||'<tr><td colspan="7" class="empty-note">데이터 없음</td></tr>';
}

// ─── 캐시 초기화 ────────────────────────────────────────

// ─── 결제 fetch ──────────────────────────────────────────
function fetchPay() {
  var el=document.getElementById('payStatus'), spn=document.getElementById('paySpin');
  el.textContent='불러오는 중...'; el.className='up-status';
  spn.style.display='inline-block';
  var url='https://docs.google.com/spreadsheets/d/'+PAYMENT_FILE_ID+'/export?format=csv&gid='+PAYMENT_GID;
  console.log('[Pay] fetch URL:', url);
  fetch(url, {redirect:'follow'}).then(function(r){
    if(!r.ok)throw new Error('HTTP '+r.status);
    return r.text();
  }).then(function(text){
    console.log('[Pay] CSV 앞 200자:', text.slice(0,200));
    var parsed=parsePayCSV(text);
    if(!parsed)throw new Error('데이터 없음');
    state.pay=parsed;
    var cnt=Object.keys(parsed.map).length;
    el.textContent='✓ '+cnt+'명 로드됨'; el.className='up-status ok';
    spn.style.display='none';
    tryRender();
  }).catch(function(err){
    var msg = err.message||'';
    if(msg.indexOf('Failed to fetch')>=0||msg.indexOf('NetworkError')>=0||msg.indexOf('CORS')>=0) {
      el.textContent='❌ 시트 공개 설정 필요 (링크가 있는 모든 사용자-뷰어)';
    } else {
      el.textContent='오류: '+msg;
    }
    el.className='up-status err';
    spn.style.display='none';
  });
}

// ─── 파일 핸들러 ─────────────────────────────────────────
function onV1File(input) {
  var file=input.files[0]; if(!file)return;
  var el=document.getElementById('v1Status'); el.textContent='읽는 중...'; el.className='up-status';
  var r=new FileReader();
  r.onload=function(e){
    try{var wb=XLSX.read(e.target.result,{type:'array'}); var p=parseV1Workbook(wb);
      if(!p)throw new Error('피벗_교사별_날짜별 시트 없음');
      state.v1=p; try{localStorage.setItem('dash_v1',JSON.stringify(p));}catch(ex){}
      var ym0=getDate().ym;
      var allDates=[]; Object.values(p).forEach(function(t){Object.keys(t.daily||{}).forEach(function(ds){if(allDates.indexOf(ds)<0)allDates.push(ds);});});
      allDates.sort();
      var dfrom=allDates.length>0?allDates[0].slice(0,7):'';
      var dto=allDates.length>0?allDates[allDates.length-1].slice(0,7):'';
      var thisMonthEnd=0; Object.values(p).forEach(function(t){Object.keys(t.daily||{}).forEach(function(ds){if(ds.slice(0,7)===ym0)thisMonthEnd+=(t.daily[ds]||0);});});
      var rng=dfrom&&dto&&dfrom!==dto?dfrom+'~'+dto:dfrom;
      el.textContent='✓ '+file.name+' ('+Object.keys(p).length+'명 | '+rng+' | '+ym0+' 종료'+thisMonthEnd+'건)';
      el.className='up-status ok';
    }catch(ex){el.textContent='오류: '+ex.message; el.className='up-status err';}
    tryRender();
  };
  r.readAsArrayBuffer(file);
}

// ─── 초기화 ─────────────────────────────────────────────
document.getElementById('hdrDate').textContent=getDate().label;

try{var c=localStorage.getItem('dash_v1');if(c){state.v1=JSON.parse(c);var n=Object.keys(state.v1).length;
  var ym0c=getDate().ym;
  var thisMonthTotalC=0; Object.values(state.v1).forEach(function(t){Object.keys(t.daily||{}).forEach(function(ds){if(ds.slice(0,7)===ym0c)thisMonthTotalC+=(t.daily[ds]||0);});});
  document.getElementById('v1Status').textContent='✓ 캐시 ('+n+'명 | '+ym0c+' 종료'+thisMonthTotalC+'건) ← 새 파일 선택 권장';
  document.getElementById('v1Status').className='up-status ok';}}catch(e){}

fetchPay();
